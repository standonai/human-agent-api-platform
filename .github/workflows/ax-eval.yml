name: AX Eval

# Drives a real Claude agent against the reference platform and a vanilla
# baseline, measuring zero-shot success. Requires the ANTHROPIC_API_KEY
# secret; runs are skipped cleanly when it is not configured.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

jobs:
  ax-eval:
    name: Agent eval (reference vs baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run AX eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not configured — skipping live eval."
            exit 0
          fi
          npm run eval

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ax-eval-results
          path: apps/eval/results/
          if-no-files-found: ignore
