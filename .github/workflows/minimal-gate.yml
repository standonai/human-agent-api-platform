name: Minimal Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  minimal-gate:
    name: Typecheck + Targeted + Startup Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Targeted unit tests
        run: npm run test:targeted

      - name: Startup validation smoke
        run: npm run smoke:startup
