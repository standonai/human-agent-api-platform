              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 10
                      needsRotation:
                        type: integer
                        example: 2
                      expired:
                        type: integer
                        example: 0
                      rotationEnabled:
                        type: integer
                        example: 8
                      byEnvironment:
                        type: object
                        additionalProperties:
                          type: integer
                        example:
                          production: 5
                          staging: 3
                      byService:
                        type: object
                        additionalProperties:
                          type: integer
                        example:
                          auth-service: 3
                          api-gateway: 2
                      upcomingRotations:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              example: jwt-secret
                            nextRotation:
                              type: string
                              format: date-time
                            daysUntilRotation:
                              type: integer
                              example: 15

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
          $ref: '#/components/responses/Forbidden'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/secrets/{name}:
    get:
      operationId: getSecretMetadata
      summary: Get secret metadata
      tags:
        - secrets
      description: |
        Get lifecycle metadata for a specific secret. Admin only.
        The actual secret value is never returned.
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - name: name
          in: path
          required: true
          description: Secret name
          schema:
            type: string
            example: jwt-secret

      responses:
        '200':
          description: Secret metadata
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SecretMetadata'

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
          $ref: '#/components/responses/Forbidden'

        '404':
          description: Secret not found
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: Secret jwt-secret not found
                  details:
                    - code: NOT_FOUND
                      message: The requested secret does not exist
                      suggestion: Check the secret name or use GET /api/secrets to list all secrets
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/secrets/{name}/rotate:
    post:
      operationId: rotateSecret
      summary: Manually rotate a secret
      tags:
        - secrets
      description: |
        Trigger immediate rotation of a secret. Admin only.
        Use force=true to override rotation schedule.
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'
        - name: name
          in: path
          required: true
          description: Secret name to rotate
          schema:
            type: string
            example: jwt-secret

      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Force rotation even if not due
                  default: false
                  example: true

      responses:
        '200':
          description: Secret rotated
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      previousVersion:
                        type: integer
                        example: 1
                      newVersion:
                        type: integer
                        example: 2
                  message:
                    type: string
                    example: Secret jwt-secret rotated successfully

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
          $ref: '#/components/responses/Forbidden'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

        '500':
          description: Rotation failed
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: Secret rotation failed
                  details:
                    - code: ROTATION_ERROR
                      message: Unable to rotate secret
                      suggestion: Check the rotation strategy configuration and provider connectivity
                  request_id: req_abc123

  /api/secrets/{name}/register:
    post:
      operationId: registerSecret
      summary: Register a secret for lifecycle management
      tags:
        - secrets
      description: |
        Register a secret to enable rotation scheduling and lifecycle tracking. Admin only.
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'
        - name: name
          in: path
          required: true
          description: Secret name to register
          schema:
            type: string
            example: db-password

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSecretRequest'
            examples:
              basic:
                summary: Register with rotation
                value:
                  rotationSchedule:
                    enabled: true
                    intervalDays: 30
                    strategy: database
                  scope:
                    environments: [production]
                    services: [auth-service]
                    roles: [admin]
                  tags:
                    team: platform

      responses:
        '201':
          description: Secret registered
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Secret db-password registered successfully
                  data:
                    $ref: '#/components/schemas/SecretMetadata'

        '400':
          description: Invalid registration data
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_PARAMETER
                  message: Invalid rotation schedule configuration
                  details:
                    - code: VALIDATION_ERROR
                      message: intervalDays must be a positive number
                      suggestion: Set intervalDays to 30, 60, or 90 for standard rotation intervals
                  request_id: req_abc123

        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
          $ref: '#/components/responses/Forbidden'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  # ==========================================================================
  # Gateway
  # ==========================================================================
  /api/gateway/status:
    get:
      operationId: getGatewayStatus
      summary: Get gateway connection status
      tags:
        - gateway
      description: |
        Returns the health and configuration status of connected API gateways.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'

      responses:
        '200':
          description: Gateway status
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                        example: kong
                      connected:
                        type: boolean
                        example: true
                      lastSync:
                        type: string
                        format: date-time
                  meta:
                    type: object
                    properties:
                      timestamp:
                        type: string
                        format: date-time

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/gateway/sync:
    post:
      operationId: syncGateway
      summary: Sync OpenAPI spec to gateway
      tags:
        - gateway
      description: |
        Manually trigger synchronization of the OpenAPI spec to the configured gateway.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      responses:
        '200':
          description: Sync successful
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      routesSynced:
                        type: integer
                        example: 8
                  message:
                    type: string
                    example: OpenAPI spec synced successfully

        '400':
          description: Gateway not configured
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_PARAMETER
                  message: Gateway is not configured
                  details:
                    - code: MISSING_CONFIGURATION
                      message: No gateway provider configured
                      suggestion: Set GATEWAY_PROVIDER environment variable to kong or apigee
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

        '500':
          description: Sync failed
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: Failed to sync OpenAPI spec
                  details:
                    - code: SYNC_ERROR
                      message: Connection refused to gateway at kong:8001
                      suggestion: Check gateway configuration and connectivity
                  request_id: req_abc123

  # ==========================================================================
