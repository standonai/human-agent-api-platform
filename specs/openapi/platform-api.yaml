  # ==========================================================================
  # Converter
  # ==========================================================================
  /api/convert:
    post:
      operationId: convertOpenAPI
      summary: Convert OpenAPI to tool definitions
      tags:
        - converter
      description: |
        Convert OpenAPI 3.x specification to AI agent tool definitions.

        Supports output formats:
        - OpenAI function calling schema
        - Anthropic tool use schema

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - spec
              properties:
                spec:
                  type: object
                  description: OpenAPI 3.x specification object
                format:
                  type: string
                  enum: [openai, anthropic, both, generic]
                  default: both
                  description: Output format for tool definitions
                filter:
                  type: object
                  description: Optional filters to include specific operations
                  properties:
                    tags:
                      type: array
                      items:
                        type: string
                      description: Include only operations with these tags
                    methods:
                      type: array
                      items:
                        type: string
                        enum: [GET, POST, PUT, DELETE, PATCH]
                      description: Include only these HTTP methods
                    paths:
                      type: array
                      items:
                        type: string
                      description: Include only matching paths (supports wildcards)

      responses:
        '200':
          description: Conversion successful
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  operationsCount:
                    type: integer
                    example: 5
                  apiTitle:
                    type: string
                    example: My API
                  apiVersion:
                    type: string
                    example: 1.0.0
                  openai:
                    type: array
                    items:
                      type: object
                  anthropic:
                    type: array
                    items:
                      type: object

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/convert/validate:
    post:
      operationId: validateOpenAPI
      summary: Validate an OpenAPI spec
      tags:
        - converter
      description: |
        Validate an OpenAPI specification without converting it.
        Returns issues and a list of detected operations.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - spec
              properties:
                spec:
                  type: object
                  description: OpenAPI specification to validate

      responses:
        '200':
          description: Validation result
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  issues:
                    type: array
                    items:
                      type: object
                      properties:
                        severity:
                          type: string
                          enum: [error, warning]
                        message:
                          type: string
                        path:
                          type: string
                  operationsCount:
                    type: integer
                    example: 5
                  operations:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        method:
                          type: string
                        path:
                          type: string
                        description:
                          type: string

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/convert/info:
    get:
      operationId: getConverterInfo
      summary: Get converter capabilities
      tags:
        - converter
      description: |
        Returns information about the OpenAPI-to-tool converter,
        including supported formats and features.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'

      responses:
        '200':
          description: Converter information
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: OpenAPI to AI Agent Tool Converter
                  version:
                    type: string
                    example: 1.0.0
                  supportedFormats:
                    type: array
                    items:
                      type: string
                    example: [openai, anthropic, generic]
                  supportedOpenAPIVersions:
                    type: array
                    items:
                      type: string
                    example: ['3.0.x', '3.1.x']
                  features:
                    type: array
                    items:
                      type: string
                  filters:
                    type: object
                    properties:
                      tags:
                        type: string
                      methods:
                        type: string
                      paths:
                        type: string

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

# ==============================================================================
# Components
# ==============================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /api/auth/login

  parameters:
    API-Version:
      name: API-Version
      in: header
      description: |
        API version in YYYY-MM-DD format.
        Defaults to latest stable version if not specified.
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
        example: '2025-01-29'

    X-Agent-ID:
      name: X-Agent-ID
      in: header
      description: |
        Optional identifier for the AI agent making the request.
        Used for custom rate limiting and analytics.
      required: false
      schema:
        type: string
        example: 'my-gpt4-agent'

    DryRun:
      name: dry_run
      in: query
      description: |
        Validate the request without executing it.
        Returns validation results and what would happen.
      required: false
      schema:
        type: boolean
        default: false
        example: true

  headers:
    X-Request-ID:
      description: Unique request identifier for tracing and support
      schema:
        type: string
        example: req_abc123

    X-Detected-Agent-Type:
      description: Automatically detected agent type
      schema:
        type: string
        enum: [human, openai, anthropic, custom]
        example: openai

    X-RateLimit-Limit:
      description: Maximum requests allowed in the current window
      schema:
        type: integer
        example: 500

    X-RateLimit-Remaining:
      description: Requests remaining in the current window
      schema:
        type: integer
        example: 387

    X-RateLimit-Reset:
      description: Time when the rate limit window resets
      schema:
        type: string
        format: date-time
        example: '2025-01-30T10:15:00.000Z'

    Retry-After:
      description: Seconds to wait before retrying (set when rate limited)
      schema:
        type: integer
        example: 42

  schemas:
    # Auth schemas
    RegisterRequest:
      type: object
      description: User registration request
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          description: Email address (must be unique)
          example: alice@example.com
        password:
          type: string
          minLength: 8
          description: Password (minimum 8 characters)
          example: securePass123
        name:
          type: string
          description: Full name
          example: Alice Johnson
        role:
          type: string
          enum: [admin, developer, viewer]
          default: viewer
          description: User role (defaults to viewer)
          example: developer

    LoginRequest:
      type: object
      description: Login credentials
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Registered email address
          example: alice@example.com
        password:
          type: string
          description: Account password
          example: securePass123

    RefreshTokenRequest:
      type: object
      description: Refresh token exchange request
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Valid refresh token from login or previous refresh
          example: eyJhbGciOiJIUzI1NiIs...

    UserResponse:
      type: object
      description: User profile (no sensitive fields)
      properties:
        id:
          type: string
          example: user_1
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Johnson
        role:
          type: string
          enum: [admin, developer, viewer]
          example: developer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time

    # User schemas
    User:
      type: object
      description: User entity with core profile information
      required:
        - id
        - name
        - email
        - createdAt
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Alice Johnson
        email:
          type: string
          format: email
          example: alice@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          example: 28
        createdAt:
          type: string
          format: date-time
          example: '2025-01-30T10:00:00.000Z'

    CreateUserRequest:
      type: object
      description: Request body for creating a new user
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's full name
          example: Alice Johnson
        email:
          type: string
          format: email
          description: User's email address (must be unique)
          example: alice@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: User's age (optional)
          example: 28

    UpdateUserRequest:
      type: object
      description: Request body for updating an existing user (all fields optional)
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's full name
          example: Alice Johnson
        email:
          type: string
          format: email
          description: User's email address
          example: alice@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: User's age
          example: 28

    # Task schemas
    Task:
      type: object
      description: Task entity with ownership tracking
      required:
        - id
        - title
        - status
        - createdBy
        - ownerId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: task_1
        title:
          type: string
          example: Implement login page
        description:
          type: string
          example: Build the login page with email/password form
        status:
          type: string
          enum: [todo, in_progress, done]
          example: todo
        assignee:
          type: string
          example: user_2
        createdBy:
          type: string
          description: User/agent ID that created this task
          example: user_1
        ownerId:
          type: string
          description: Primary owner of this task
          example: user_1
        updatedBy:
          type: string
          description: Last modifier
          example: user_1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      description: Request body for creating a task
      required:
        - title
      properties:
        title:
          type: string
          description: Task title (1-200 characters)
          example: Implement login page
        description:
          type: string
          description: Detailed task description
          example: Build the login page with email/password form
        status:
          type: string
          enum: [todo, in_progress, done]
          default: todo
          description: Initial task status
          example: todo
        assignee:
          type: string
          description: User ID to assign the task to
          example: user_2

    UpdateTaskRequest:
      type: object
      description: Request body for updating a task (all fields optional)
      properties:
        title:
          type: string
          description: Task title
          example: Updated task title
        description:
          type: string
          description: Task description
          example: Updated description
        status:
          type: string
          enum: [todo, in_progress, done]
          description: Task status
          example: in_progress
        assignee:
          type: string
          description: Assignee user ID
          example: user_3

    # Agent schemas
    Agent:
      type: object
      description: Registered AI agent (API key hash hidden)
      properties:
        id:
          type: string
          example: agent_abc123
        name:
          type: string
          example: production-bot
        apiKeyHash:
          type: string
          example: '***hidden***'
        active:
          type: boolean
          example: true
        rateLimitOverride:
          type: integer
          example: 1000
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    AgentWithKey:
      type: object
      description: Agent with plaintext API key (only returned on registration)
      properties:
        id:
          type: string
          example: agent_abc123
        name:
          type: string
          example: production-bot
        apiKey:
          type: string
          description: Plaintext API key (save immediately, shown only once)
          example: ak_abc123def456...
        active:
          type: boolean
          example: true
        rateLimitOverride:
          type: integer
          example: 1000
        createdAt:
          type: string
          format: date-time

    RegisterAgentRequest:
      type: object
      description: Request body for registering an AI agent
      required:
        - name
      properties:
        name:
          type: string
          description: Descriptive name for the agent
          example: production-bot
        rateLimitOverride:
          type: integer
          minimum: 0
          description: Custom rate limit (requests per minute). Omit for default (500).
          example: 1000

    # Audit schemas
    AuditStats:
      type: object
      description: Aggregate audit statistics
      properties:
        totalEvents:
          type: integer
          example: 1234
        securityEvents:
          type: integer
          example: 12
        failedLogins:
          type: integer
          example: 3
        activeUsers:
          type: integer
          example: 25
        activeAgents:
          type: integer
          example: 5

    AuditLogEntry:
      type: object
      description: A single audit log entry
      properties:
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string
          example: req_abc123
        userId:
          type: string
        userEmail:
          type: string
        userRole:
          type: string
        agentId:
          type: string
        agentName:
          type: string
        ip:
          type: string
          example: 192.168.1.1
        method:
          type: string
          example: POST
        path:
          type: string
          example: /api/auth/login
        statusCode:
          type: integer
          example: 200
        duration:
          type: integer
          description: Request duration in milliseconds
          example: 45
        event:
          type: string
          example: USER_LOGIN
        eventCategory:
          type: string
          enum: [AUTHENTICATION, AUTHORIZATION, DATA_ACCESS, SECURITY, ADMIN, SYSTEM]
        severity:
          type: string
          enum: [INFO, WARNING, ERROR, CRITICAL]

    # Secret schemas
    SecretMetadata:
      type: object
      description: Secret lifecycle metadata (value never exposed)
      properties:
        name:
          type: string
          example: jwt-secret
        version:
          type: integer
          example: 3
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        expired:
          type: boolean
          example: false
        needsRotation:
          type: boolean
          example: true
        rotationSchedule:
          type: object
          properties:
            enabled:
              type: boolean
              example: true
            intervalDays:
              type: integer
              example: 30
            nextRotation:
              type: string
              format: date-time
            lastRotation:
              type: string
              format: date-time
            strategy:
              type: string
              example: database
        scope:
          type: object
          properties:
            environments:
              type: array
              items:
                type: string
              example: [production]
            services:
              type: array
              items:
                type: string
              example: [auth-service]
            roles:
              type: array
              items:
                type: string
              example: [admin]
        tags:
          type: object
          additionalProperties:
            type: string
          example:
            team: platform

    RegisterSecretRequest:
      type: object
      description: Request body for registering a secret for lifecycle management
      properties:
        rotationSchedule:
          type: object
          properties:
            enabled:
              type: boolean
              description: Enable automatic rotation
              example: true
            intervalDays:
              type: integer
              description: Rotation interval in days
              example: 30
            strategy:
              type: string
              enum: [database, jwt, api-key, oauth, encryption-key]
              description: Rotation strategy
              example: database
        scope:
          type: object
          properties:
            environments:
              type: array
              items:
                type: string
              description: Environments this secret applies to
              example: [production, staging]
            services:
              type: array
              items:
                type: string
              description: Services that use this secret
              example: [auth-service]
            roles:
              type: array
              items:
                type: string
              description: Roles that can access this secret
              example: [admin]
        expiresAt:
          type: string
          format: date-time
          description: Absolute expiration date
        tags:
          type: object
          additionalProperties:
            type: string
          description: Key-value tags for organization
          example:
            team: platform

    # Monitoring schemas
    HealthCheck:
      type: object
      description: Comprehensive health check result
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          example: healthy
        timestamp:
          type: string
          format: date-time
        components:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum: [healthy, degraded, unhealthy]
              latency:
                type: number
                description: Component response time in ms

    # Common schemas
    DryRunResponse:
      type: object
      description: Response returned when dry_run mode is enabled
      required:
        - dry_run
        - validation
        - message
      properties:
        dry_run:
          type: boolean
          const: true
        validation:
          type: string
          enum: [passed, failed]
          example: passed
        message:
          type: string
          example: User would be created successfully

    ErrorResponse:
      type: object
      description: Standard error response envelope containing error details
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ApiError'

    ApiError:
      type: object
      description: Detailed error information following RFC 7807 problem details pattern
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - INVALID_PARAMETER
            - MISSING_REQUIRED_FIELD
            - VALUE_OUT_OF_RANGE
            - INVALID_FORMAT
            - RESOURCE_NOT_FOUND
            - CONFLICT
            - UNAUTHORIZED
            - FORBIDDEN
            - RATE_LIMIT_EXCEEDED
            - INTERNAL_SERVER_ERROR
            - SERVICE_UNAVAILABLE
          example: INVALID_PARAMETER
        message:
          type: string
          description: Human-readable error description
          example: The limit parameter is out of range
        target:
          type: string
          description: The field or parameter that caused the error
          example: limit
        details:
          type: array
          description: Additional error details with actionable suggestions
          items:
            $ref: '#/components/schemas/ErrorDetail'
        doc_url:
          type: string
          format: uri
          description: URL to error documentation
          example: https://docs.example.com/errors/INVALID_PARAMETER
        request_id:
          type: string
          description: Unique request identifier for support
          example: req_abc123

    ErrorDetail:
      type: object
      description: Granular error detail with actionable suggestions for agent self-correction
      required:
        - code
        - message
        - suggestion
      properties:
        code:
          type: string
          description: Specific error detail code
          example: VALUE_OUT_OF_RANGE
        message:
          type: string
          description: Detailed error message
          example: limit must be between 1 and 100
        suggestion:
          type: string
          description: Actionable suggestion for fixing the error (REQUIRED for agent self-correction)
          example: Set limit to a value between 1 and 100, or omit it to use the default of 20
        target:
          type: string
          description: Specific field this detail relates to
          example: limit

  responses:
    BadRequest:
      description: Invalid request parameters
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INVALID_PARAMETER
              message: The limit parameter is out of range
              target: limit
              details:
                - code: VALUE_OUT_OF_RANGE
                  message: limit must be between 1 and 100
                  suggestion: Set limit to a value between 1 and 100, or omit it to use the default of 20
                  target: limit
              request_id: req_abc123

    Unauthorized:
      description: Authentication required
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Authentication required
              details:
                - code: MISSING_TOKEN
                  message: No Bearer token provided
                  suggestion: Include Authorization header with a valid Bearer token from /api/auth/login
              request_id: req_abc123

    Forbidden:
      description: Insufficient permissions
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FORBIDDEN
              message: Insufficient permissions
              details:
                - code: PERMISSION_DENIED
                  message: Your role does not have access to this resource
                  suggestion: Contact an admin to request the required permissions
              request_id: req_abc123

    NotFound:
      description: Resource not found
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: The requested resource was not found
              target: id
              details:
                - code: NOT_FOUND
                  message: The requested resource does not exist
                  suggestion: Check the ID and try again, or list resources to find the correct ID
                  target: id
              request_id: req_abc123

    RateLimitExceeded:
      description: Rate limit exceeded
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Rate limit exceeded
              details:
                - code: TOO_MANY_REQUESTS
                  message: You have exceeded the rate limit of 500 requests per 60 seconds
                  suggestion: Wait 42 seconds before retrying. Implement exponential backoff to avoid retry storms.
                  target: rate_limit
              request_id: req_abc123
