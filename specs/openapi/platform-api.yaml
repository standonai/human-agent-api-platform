openapi: 3.1.0
info:
  title: Human-Agent API Platform
  version: '2025-01-29'
  description: |
    API platform designed as a first-class experience for both human developers and AI agents.

    **Key Features:**
    - Schema-first design with complete OpenAPI specs
    - Structured error responses with actionable suggestions
    - Agent-aware rate limiting (100 human / 500 agent requests per minute)
    - Header-based versioning (API-Version: YYYY-MM-DD)
    - Dry-run mode for all mutations (?dry_run=true)
    - Automatic agent detection and tracking

    **For AI Agents:**
    - All parameters include descriptions and examples
    - Errors include actionable suggestions for self-correction
    - Rate limit headers enable proactive throttling
    - Retry-After headers prevent retry storms

  contact:
    name: API Platform Team
    email: api-support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Development
  - url: https://api.example.com
    description: Production

tags:
  - name: health
    description: Health check and monitoring
  - name: auth
    description: Authentication (register, login, refresh, logout)
  - name: users
    description: User management operations
  - name: tasks
    description: Task management with OWASP authorization
  - name: agents
    description: AI agent registration and management (admin only)
  - name: audit
    description: Audit log viewing and search (admin only)
  - name: secrets
    description: Secret lifecycle management (admin only)
  - name: gateway
    description: API gateway sync and status
  - name: monitoring
    description: Prometheus metrics and health checks
  - name: converter
    description: OpenAPI to tool definition conversion

paths:
  # ==========================================================================
  # Health
  # ==========================================================================
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - health
      description: |
        Returns the health status of the API platform.
        This endpoint is not rate limited.

      responses:
        '200':
          description: Service is healthy
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                    example: healthy
                  version:
                    type: string
                    example: '2025-01-29'
                  timestamp:
                    type: string
                    format: date-time
                    example: '2025-01-30T10:00:00.000Z'

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  # ==========================================================================
  # Auth
  # ==========================================================================
  /api/auth/register:
    post:
      operationId: registerUser
      summary: Register a new user
      tags:
        - auth
      description: |
        Create a new user account and receive JWT tokens.
        Default role is viewer unless specified.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              basic:
                summary: Basic registration
                value:
                  email: alice@example.com
                  password: securePass123
                  name: Alice Johnson
              withRole:
                summary: Registration with role
                value:
                  email: bob@example.com
                  password: securePass456
                  name: Bob Smith
                  role: developer

      responses:
        '201':
          description: User registered successfully
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserResponse'
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIs...
                      refreshToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIs...
                      expiresIn:
                        type: integer
                        example: 3600

        '400':
          description: Invalid registration data
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: MISSING_REQUIRED_FIELD
                  message: Email, password, and name are required
                  details:
                    - code: MISSING_FIELDS
                      message: Required fields missing
                      suggestion: Provide email, password, and name in request body
                  request_id: req_abc123

        '409':
          description: User already exists
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFLICT
                  message: User already exists
                  target: email
                  details:
                    - code: DUPLICATE_EMAIL
                      message: A user with this email already exists
                      suggestion: Use a different email or login to existing account
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/auth/login:
    post:
      operationId: loginUser
      summary: Login with email and password
      tags:
        - auth
      description: |
        Authenticate with email and password to receive JWT tokens.
        Access token expires in 1 hour, refresh token in 7 days.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              basic:
                summary: Login
                value:
                  email: alice@example.com
                  password: securePass123

      responses:
        '200':
          description: Login successful
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/UserResponse'
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIs...
                      refreshToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIs...
                      expiresIn:
                        type: integer
                        example: 3600

        '400':
          description: Missing credentials
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: MISSING_REQUIRED_FIELD
                  message: Email and password are required
                  details:
                    - code: MISSING_CREDENTIALS
                      message: Both email and password must be provided
                      suggestion: Include email and password in request body
                  request_id: req_abc123

        '401':
          description: Invalid credentials
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Invalid credentials
                  details:
                    - code: INVALID_CREDENTIALS
                      message: Email or password is incorrect
                      suggestion: Check your email and password and try again
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      tags:
        - auth
      description: |
        Exchange a valid refresh token for a new token pair.
        Use when access token expires.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            examples:
              basic:
                summary: Refresh token
                value:
                  refreshToken: eyJhbGciOiJIUzI1NiIs...

      responses:
        '200':
          description: Token refreshed
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIs...
                      refreshToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIs...
                      expiresIn:
                        type: integer
                        example: 3600

        '400':
          description: Missing refresh token
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: MISSING_REQUIRED_FIELD
                  message: Refresh token is required
                  target: refreshToken
                  details:
                    - code: MISSING_REFRESH_TOKEN
                      message: No refresh token provided
                      suggestion: Include refreshToken in request body
                  request_id: req_abc123

        '401':
          description: Invalid or expired refresh token
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Invalid refresh token
                  target: refreshToken
                  details:
                    - code: INVALID_REFRESH_TOKEN
                      message: Refresh token is invalid or malformed
                      suggestion: Login again to get a valid refresh token
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current authenticated user
      tags:
        - auth
      description: |
        Returns the profile of the currently authenticated user.
        Requires a valid Bearer token.
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'

      responses:
        '200':
          description: Current user info
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/auth/logout:
    post:
      operationId: logoutUser
      summary: Logout current user
      tags:
        - auth
      description: |
        Invalidate the current session. Client should delete stored tokens.
        Stateless JWT - server acknowledges, client is responsible for token cleanup.
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      responses:
        '200':
          description: Logout acknowledged
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Logged out successfully
                      suggestion:
                        type: string
                        example: Delete your access and refresh tokens from client storage

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  # ==========================================================================
  # Users
  # ==========================================================================
  /api/v2/users:
    get:
      operationId: listUsers
      summary: List users
      tags:
        - users
      description: |
        List users with pagination and optional filtering.

        **Rate Limits:**
        - Human users: 100 requests/minute
        - AI agents: 500 requests/minute

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - name: limit
          in: query
          description: Maximum number of users to return. Must be between 1 and 100.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 50
        - name: status
          in: query
          description: Filter users by status
          required: false
          schema:
            type: string
            enum: [active, inactive]
            example: active

      responses:
        '200':
          description: List of users
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 42
                      limit:
                        type: integer
                        example: 20

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    post:
      operationId: createUser
      summary: Create a new user
      tags:
        - users
      description: |
        Create a new user with validation.

        **Dry-run mode:** Add `?dry_run=true` to validate without creating.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              basic:
                summary: Basic user creation
                value:
                  name: Alice Johnson
                  email: alice@example.com
              withAge:
                summary: User with optional age
                value:
                  name: Bob Smith
                  email: bob@example.com
                  age: 35

      responses:
        '201':
          description: User created successfully
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'

        '200':
          description: Dry-run validation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DryRunResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFLICT
                  message: A user with this email already exists
                  target: email
                  details:
                    - code: DUPLICATE_VALUE
                      message: Email alice@example.com is already registered
                      suggestion: Use a different email address or retrieve the existing user
                      target: email
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v2/users/{id}:
    get:
      operationId: getUser
      summary: Get a user by ID
      tags:
        - users
      description: Retrieve a specific user by their ID.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1

      responses:
        '200':
          description: User found
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: User with ID 999 not found
                  target: id
                  details:
                    - code: NOT_FOUND
                      message: The requested user does not exist
                      suggestion: Check the user ID and try again, or list all users to find the correct ID
                      target: id
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    put:
      operationId: updateUser
      summary: Update a user
      tags:
        - users
      description: |
        Update an existing user. All fields are optional.

        **Dry-run mode:** Add `?dry_run=true` to validate without updating.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'

      responses:
        '200':
          description: User updated successfully
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
                  - $ref: '#/components/schemas/DryRunResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    delete:
      operationId: deleteUser
      summary: Delete a user
      tags:
        - users
      description: |
        Delete a user by ID.

        **Dry-run mode:** Add `?dry_run=true` to validate without deleting.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1

      responses:
        '204':
          description: User deleted successfully
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'

        '200':
          description: Dry-run validation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DryRunResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  # ==========================================================================
  # Tasks
  # ==========================================================================
  /api/v2/tasks:
    get:
      operationId: listTasks
      summary: List tasks
      tags:
        - tasks
      description: |
        List tasks with pagination and filtering. Non-admin users see only their own tasks.
        Requires authentication. Fields filtered by role (OWASP API3).
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - name: status
          in: query
          description: Filter by task status
          required: false
          schema:
            type: string
            enum: [todo, in_progress, done]
            example: todo
        - name: assignee
          in: query
          description: Filter by assignee ID
          required: false
          schema:
            type: string
            example: user_1
        - name: limit
          in: query
          description: Maximum number of tasks to return
          required: false
          schema:
            type: integer
            default: 50
            example: 20
        - name: offset
          in: query
          description: Number of tasks to skip for pagination
          required: false
          schema:
            type: integer
            default: 0
            example: 0

      responses:
        '200':
          description: List of tasks
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 15
                      limit:
                        type: integer
                        example: 50
                      offset:
                        type: integer
                        example: 0

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    post:
      operationId: createTask
      summary: Create a new task
      tags:
        - tasks
      description: |
        Create a task with automatic ownership tracking.
        Supports dry-run mode for validation.
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              basic:
                summary: Basic task
                value:
                  title: Implement login page
              full:
                summary: Task with all fields
                value:
                  title: Fix authentication bug
                  description: Token refresh fails after 6 hours
                  status: in_progress
                  assignee: user_2

      responses:
        '201':
          description: Task created
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'

        '200':
          description: Dry-run validation passed
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DryRunResponse'

        '400':
          description: Invalid task data
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_PARAMETER
                  message: Title is required
                  target: title
                  details:
                    - code: VALIDATION_ERROR
                      message: Title must be a non-empty string
                      suggestion: Provide a title between 1-200 characters
                  request_id: req_abc123

        '401':
          $ref: '#/components/responses/Unauthorized'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v2/tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task by ID
      tags:
        - tasks
      description: |
        Retrieve a task. Object-level authorization enforced (OWASP API1).
        Non-admin users can only access tasks they own.
      security:
        - BearerAuth: []

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: string
            example: task_1

      responses:
        '200':
          description: Task found
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '403':
