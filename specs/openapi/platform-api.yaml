openapi: 3.1.0
info:
  title: Human-Agent API Platform
  version: '2025-01-29'
  description: |
    API platform designed as a first-class experience for both human developers and AI agents.

    **Key Features:**
    - Schema-first design with complete OpenAPI specs
    - Structured error responses with actionable suggestions
    - Agent-aware rate limiting (100 human / 500 agent requests per minute)
    - Header-based versioning (API-Version: YYYY-MM-DD)
    - Dry-run mode for all mutations (?dry_run=true)
    - Automatic agent detection and tracking

    **For AI Agents:**
    - All parameters include descriptions and examples
    - Errors include actionable suggestions for self-correction
    - Rate limit headers enable proactive throttling
    - Retry-After headers prevent retry storms

  contact:
    name: API Platform Team
    email: api-support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Development
  - url: https://api.example.com
    description: Production

tags:
  - name: health
    description: Health check and monitoring
  - name: users
    description: User management operations
  - name: converter
    description: OpenAPI to tool definition conversion
  - name: agent
    description: Agent-specific endpoints

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - health
      description: |
        Returns the health status of the API platform.
        This endpoint is not rate limited.

      responses:
        '200':
          description: Service is healthy
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                    example: healthy
                  version:
                    type: string
                    example: '2025-01-29'
                  timestamp:
                    type: string
                    format: date-time
                    example: '2025-01-30T10:00:00.000Z'

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/agents/info:
    get:
      operationId: getAgentInfo
      summary: Get agent information
      tags:
        - agent
      description: |
        Returns information about the detected agent making the request.
        Useful for debugging agent detection.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'

      responses:
        '200':
          description: Agent information
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-Detected-Agent-Type:
              $ref: '#/components/headers/X-Detected-Agent-Type'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  agent:
                    type: object
                    properties:
                      type:
                        type: string
                        enum: [human, openai, anthropic, custom]
                      id:
                        type: string
                      userAgent:
                        type: string
                  request:
                    type: object
                    properties:
                      id:
                        type: string
                      version:
                        type: string
                      timestamp:
                        type: string
                        format: date-time

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v2/users:
    get:
      operationId: listUsers
      summary: List users
      tags:
        - users
      description: |
        List users with pagination and optional filtering.

        **Rate Limits:**
        - Human users: 100 requests/minute
        - AI agents: 500 requests/minute

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - name: limit
          in: query
          description: Maximum number of users to return. Must be between 1 and 100.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 50
        - name: status
          in: query
          description: Filter users by status
          required: false
          schema:
            type: string
            enum: [active, inactive]
            example: active

      responses:
        '200':
          description: List of users
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 42
                      limit:
                        type: integer
                        example: 20

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    post:
      operationId: createUser
      summary: Create a new user
      tags:
        - users
      description: |
        Create a new user with validation.

        **Dry-run mode:** Add `?dry_run=true` to validate without creating.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              basic:
                summary: Basic user creation
                value:
                  name: Alice Johnson
                  email: alice@example.com
              withAge:
                summary: User with optional age
                value:
                  name: Bob Smith
                  email: bob@example.com
                  age: 35

      responses:
        '201':
          description: User created successfully
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'

        '200':
          description: Dry-run validation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DryRunResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CONFLICT
                  message: A user with this email already exists
                  target: email
                  details:
                    - code: DUPLICATE_VALUE
                      message: Email alice@example.com is already registered
                      suggestion: Use a different email address or retrieve the existing user
                      target: email
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/v2/users/{id}:
    get:
      operationId: getUser
      summary: Get a user by ID
      tags:
        - users
      description: Retrieve a specific user by their ID.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1

      responses:
        '200':
          description: User found
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: RESOURCE_NOT_FOUND
                  message: User with ID 999 not found
                  target: id
                  details:
                    - code: NOT_FOUND
                      message: The requested user does not exist
                      suggestion: Check the user ID and try again, or list all users to find the correct ID
                      target: id
                  request_id: req_abc123

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    put:
      operationId: updateUser
      summary: Update a user
      tags:
        - users
      description: |
        Update an existing user. All fields are optional.

        **Dry-run mode:** Add `?dry_run=true` to validate without updating.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'

      responses:
        '200':
          description: User updated successfully
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
                  - $ref: '#/components/schemas/DryRunResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    delete:
      operationId: deleteUser
      summary: Delete a user
      tags:
        - users
      description: |
        Delete a user by ID.

        **Dry-run mode:** Add `?dry_run=true` to validate without deleting.

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1

      responses:
        '204':
          description: User deleted successfully
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'

        '200':
          description: Dry-run validation passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DryRunResponse'

        '400':
          $ref: '#/components/responses/BadRequest'

        '404':
          $ref: '#/components/responses/NotFound'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /api/convert:
    post:
      operationId: convertOpenAPI
      summary: Convert OpenAPI to tool definitions
      tags:
        - converter
      description: |
        Convert OpenAPI 3.x specification to AI agent tool definitions.

        Supports output formats:
        - OpenAI function calling schema
        - Anthropic tool use schema

      parameters:
        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - spec
              properties:
                spec:
                  type: object
                  description: OpenAPI 3.x specification object
                format:
                  type: string
                  enum: [openai, anthropic, both]
                  default: both
                  description: Output format for tool definitions
                filter:
                  type: object
                  description: Optional filters to include specific operations
                  properties:
                    tags:
                      type: array
                      items:
                        type: string
                      description: Include only operations with these tags
                    methods:
                      type: array
                      items:
                        type: string
                        enum: [GET, POST, PUT, DELETE, PATCH]
                      description: Include only these HTTP methods
                    paths:
                      type: array
                      items:
                        type: string
                      description: Include only matching paths (supports wildcards)

      responses:
        '200':
          description: Conversion successful
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  operationsCount:
                    type: integer
                    example: 5
                  apiTitle:
                    type: string
                    example: My API
                  apiVersion:
                    type: string
                    example: 1.0.0
                  openai:
                    type: array
                    items:
                      type: object
                  anthropic:
                    type: array
                    items:
                      type: object

        '400':
          $ref: '#/components/responses/BadRequest'

        '429':
          $ref: '#/components/responses/RateLimitExceeded'

components:
  parameters:
    API-Version:
      name: API-Version
      in: header
      description: |
        API version in YYYY-MM-DD format.
        Defaults to latest stable version if not specified.
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
        example: '2025-01-29'

    X-Agent-ID:
      name: X-Agent-ID
      in: header
      description: |
        Optional identifier for the AI agent making the request.
        Used for custom rate limiting and analytics.
      required: false
      schema:
        type: string
        example: 'my-gpt4-agent'

    DryRun:
      name: dry_run
      in: query
      description: |
        Validate the request without executing it.
        Returns validation results and what would happen.
      required: false
      schema:
        type: boolean
        default: false
        example: true

  headers:
    X-Request-ID:
      description: Unique request identifier for tracing and support
      schema:
        type: string
        example: req_abc123

    X-Detected-Agent-Type:
      description: Automatically detected agent type
      schema:
        type: string
        enum: [human, openai, anthropic, custom]
        example: openai

    X-RateLimit-Limit:
      description: Maximum requests allowed in the current window
      schema:
        type: integer
        example: 500

    X-RateLimit-Remaining:
      description: Requests remaining in the current window
      schema:
        type: integer
        example: 387

    X-RateLimit-Reset:
      description: Time when the rate limit window resets
      schema:
        type: string
        format: date-time
        example: '2025-01-30T10:15:00.000Z'

    Retry-After:
      description: Seconds to wait before retrying (set when rate limited)
      schema:
        type: integer
        example: 42

  schemas:
    User:
      type: object
      description: User entity with core profile information
      required:
        - id
        - name
        - email
        - createdAt
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Alice Johnson
        email:
          type: string
          format: email
          example: alice@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          example: 28
        createdAt:
          type: string
          format: date-time
          example: '2025-01-30T10:00:00.000Z'

    CreateUserRequest:
      type: object
      description: Request body for creating a new user
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's full name
          example: Alice Johnson
        email:
          type: string
          format: email
          description: User's email address (must be unique)
          example: alice@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: User's age (optional)
          example: 28

    UpdateUserRequest:
      type: object
      description: Request body for updating an existing user (all fields optional)
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User's full name
          example: Alice Johnson
        email:
          type: string
          format: email
          description: User's email address
          example: alice@example.com
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: User's age
          example: 28

    DryRunResponse:
      type: object
      description: Response returned when dry_run mode is enabled
      required:
        - dry_run
        - validation
        - message
      properties:
        dry_run:
          type: boolean
          const: true
        validation:
          type: string
          enum: [passed, failed]
          example: passed
        message:
          type: string
          example: User would be created successfully

    ErrorResponse:
      type: object
      description: Standard error response envelope containing error details
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ApiError'

    ApiError:
      type: object
      description: Detailed error information following RFC 7807 problem details pattern
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - INVALID_PARAMETER
            - MISSING_REQUIRED_FIELD
            - VALUE_OUT_OF_RANGE
            - INVALID_FORMAT
            - RESOURCE_NOT_FOUND
            - CONFLICT
            - UNAUTHORIZED
            - FORBIDDEN
            - RATE_LIMIT_EXCEEDED
            - INTERNAL_SERVER_ERROR
            - SERVICE_UNAVAILABLE
          example: INVALID_PARAMETER
        message:
          type: string
          description: Human-readable error description
          example: The limit parameter is out of range
        target:
          type: string
          description: The field or parameter that caused the error
          example: limit
        details:
          type: array
          description: Additional error details with actionable suggestions
          items:
            $ref: '#/components/schemas/ErrorDetail'
        doc_url:
          type: string
          format: uri
          description: URL to error documentation
          example: https://docs.example.com/errors/INVALID_PARAMETER
        request_id:
          type: string
          description: Unique request identifier for support
          example: req_abc123

    ErrorDetail:
      type: object
      description: Granular error detail with actionable suggestions for agent self-correction
      required:
        - code
        - message
        - suggestion
      properties:
        code:
          type: string
          description: Specific error detail code
          example: VALUE_OUT_OF_RANGE
        message:
          type: string
          description: Detailed error message
          example: limit must be between 1 and 100
        suggestion:
          type: string
          description: Actionable suggestion for fixing the error (REQUIRED for agent self-correction)
          example: Set limit to a value between 1 and 100, or omit it to use the default of 20
        target:
          type: string
          description: Specific field this detail relates to
          example: limit

  responses:
    BadRequest:
      description: Invalid request parameters
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INVALID_PARAMETER
              message: The limit parameter is out of range
              target: limit
              details:
                - code: VALUE_OUT_OF_RANGE
                  message: limit must be between 1 and 100
                  suggestion: Set limit to a value between 1 and 100, or omit it to use the default of 20
                  target: limit
              request_id: req_abc123

    NotFound:
      description: Resource not found
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RESOURCE_NOT_FOUND
              message: User with ID 999 not found
              target: id
              details:
                - code: NOT_FOUND
                  message: The requested user does not exist
                  suggestion: Check the user ID and try again, or list all users to find the correct ID
                  target: id
              request_id: req_abc123

    RateLimitExceeded:
      description: Rate limit exceeded
      headers:
        X-Request-ID:
          $ref: '#/components/headers/X-Request-ID'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Rate limit exceeded
              details:
                - code: TOO_MANY_REQUESTS
                  message: You have exceeded the rate limit of 500 requests per 60 seconds
                  suggestion: Wait 42 seconds before retrying. Implement exponential backoff to avoid retry storms.
                  target: rate_limit
              request_id: req_abc123
