        - $ref: '#/components/parameters/API-Version'
        - $ref: '#/components/parameters/X-Agent-ID'
        - $ref: '#/components/parameters/DryRun'

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
            examples:
              basic:
                summary: Basic agent registration
                value:
                  name: production-bot
              withRateLimit:
                summary: Agent with custom rate limit
                value:
                  name: high-volume-agent
                  rateLimitOverride: 1000

      responses:
        '201':
          description: Agent registered (save the API key!)
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentWithKey'
                  warning:
                    type: string
                    example: Save the API key - it will not be shown again!

        '400':
          description: Invalid agent data
          headers:
            X-Request-ID:
              $ref: '#/components/headers/X-Request-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: MISSING_REQUIRED_FIELD
                  message: Agent name is required
                  target: name
                  details:
                    - code: MISSING_NAME
