services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "3443:3443"
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./config/tls:/app/config/tls:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/monitoring/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

volumes:
  redis-data:
  prometheus-data:
