apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-platform
  namespace: api-platform
  labels:
    app: api-platform
    version: v1
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-platform
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
