apiVersion: v1
kind: Service
metadata:
  name: api-platform
  namespace: api-platform
  labels:
    app: api-platform
    version: v1
    component: api
spec:
  type: ClusterIP
  selector:
    app: api-platform
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
