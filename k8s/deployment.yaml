apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-platform
  namespace: api-platform
  labels:
    app: api-platform
    version: v1
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: api-platform
      component: api
  template:
    metadata:
      labels:
        app: api-platform
        version: v1
        component: api
    spec:
      containers:
        - name: api-platform
          image: api-platform:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: api-platform-config
            - secretRef:
                name: api-platform-secrets
          env:
            - name: REDIS_HOST
              value: redis.api-platform.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
          livenessProbe:
            httpGet:
              path: /api/monitoring/health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/monitoring/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsUser: 1001
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
