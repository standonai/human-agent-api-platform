asyncapi: 3.0.0
info:
  title: Human-Agent API Platform Events
  version: '2026-06-12'
  description: |
    Event channels actually implemented by the platform. (Earlier versions
    of this document described 17 aspirational Redis/webhook channels that
    did not exist; this spec was trimmed to reality in Phase 4.)

    The platform emits approval resolution events over Server-Sent Events:
    an agent that proposed a change with `?require_approval=true` subscribes
    to `GET /api/approvals/{id}/events` and learns the outcome without
    polling. Authenticate with a Bearer token (the proposing agent's token,
    the owning user's session, or a delegated token).
  contact:
    name: API Platform Team
    email: api-support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

defaultContentType: application/json

servers:
  development:
    host: localhost:3000
    protocol: http
    description: Development server (SSE over HTTP)
  production:
    host: api.example.com
    protocol: https
    description: Production server (SSE over HTTPS, behind reverse proxy)

channels:
  approvalEvents:
    address: /api/approvals/{approvalId}/events
    description: |
      Server-Sent Events stream for one pending change. Emits the current
      status on connect, then a terminal event when the approval resolves
      (executed, failed, rejected, or expired). The stream closes after the
      terminal event. Heartbeat comments keep the connection alive.
    parameters:
      approvalId:
        description: The approval id returned by the 202 capture response.
    messages:
      approvalEvent:
        $ref: '#/components/messages/approvalEvent'

operations:
  receiveApprovalEvent:
    action: receive
    channel:
      $ref: '#/channels/approvalEvents'
    summary: Receive approval status events until resolution.
    messages:
      - $ref: '#/channels/approvalEvents/messages/approvalEvent'

components:
  messages:
    approvalEvent:
      name: approvalEvent
      title: Approval status event
      summary: Current or terminal status of a pending change.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ApprovalEvent'
      examples:
        - name: pendingOnConnect
          summary: Initial event on subscribe
          payload:
            approval_id: approval_1
            status: pending
        - name: executedTerminal
          summary: Terminal event after human approval
          payload:
            approval_id: approval_1
            status: executed
            result_status: 201

  schemas:
    ApprovalEvent:
      type: object
      description: Status event for a pending change.
      required:
        - approval_id
        - status
      properties:
        approval_id:
          type: string
          description: The pending change this event describes.
          examples:
            - approval_1
        status:
          type: string
          description: Current status; terminal values close the stream.
          enum:
            - pending
            - approved
            - rejected
            - executed
            - failed
            - expired
        result_status:
          type: integer
          description: HTTP status of the executed request (executed/failed only).
          examples:
            - 201
        reject_reason:
          type: string
          description: Reason supplied by the rejecting user (rejected only).
